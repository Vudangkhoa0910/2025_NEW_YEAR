<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧧 404 - Không Tìm Thấy | Lì Xì 2026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧧</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Playball&family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0000 0%, #4a0000 50%, #8b0000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff5e1;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .error-code {
            font-size: 8rem;
            font-family: 'Playball', cursive;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            margin-bottom: 20px;
        }
        .error-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #ffd700;
        }
        p {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: linear-gradient(135deg, #ffd700, #daa520);
            color: #b71c1c;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 30px rgba(255, 215, 0, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">🧧</div>
        <div class="error-code">404</div>
        <h1>Oops! Không Tìm Thấy Trang</h1>
        <p>Trang bạn tìm kiếm không tồn tại hoặc đã bị xóa.</p>
        <a href="/" class="btn">
            <span>🏠</span>
            <span>Về Trang Chủ</span>
        </a>
    </div>
</body>
</html>
